name: CI

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      EVIDENCE_DIR: .codescent/ci-evidence
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync

      - name: Tests
        run: uv run pytest

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Type check (basedpyright)
        run: uv run basedpyright

      - name: Deterministic offline eval
        run: >-
          uv run python evals/run_deterministic.py
          --repo tests/fixtures/python-basic
          --expected evals/fixtures/python-basic.expected.json
          --out ${{ env.EVIDENCE_DIR }}/deterministic-eval.json

      - name: Source-read-only proof
        run: >-
          uv run python scripts/prove_source_read_only.py
          --repo tests/fixtures/python-basic
          --out ${{ env.EVIDENCE_DIR }}/read-only.json

      - name: Eval precision gate
        run: uv run python evals/run_precision.py --check

      - name: Dogfood gate (CodeScent scans CodeScent)
        run: uv run python scripts/dogfood_scan.py
